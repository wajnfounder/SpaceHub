{% extends 'core/base.html' %}
{% load static %}               
{% block extra_css %}
<link rel="stylesheet" href="{% static 'spaces/css/spaces.css' %}">
{% endblock %} 




{% block title %}حذف المساحة{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5 text-center">
        <div class="card border-danger border-2 rounded-4 p-4 shadow-sm">
            <i class="fas fa-exclamation-triangle fa-4x text-danger mb-3"></i>
            <h4 class="fw-bold">هل أنت متأكد من حذف هذه المساحة؟</h4>
            <p class="text-muted">سيتم حذف <strong>{{ space.title }}</strong> وجميع بياناتها بشكل نهائي.</p>
            <form method="post" class="d-flex gap-2 justify-content-center mt-3">
                {% csrf_token %}
                <button type="submit" class="btn btn-danger fw-bold px-4">نعم، احذف</button>
                <a href="{% url 'spaces:detail' space.pk %}" class="btn btn-outline-secondary px-4">إلغاء</a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
